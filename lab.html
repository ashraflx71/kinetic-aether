<section class="glass-card p-8 rounded-[2.5rem] space-y-6 border-secondary/20 shadow-lg shadow-secondary/5">
    <div class="flex items-center gap-4">
        <div class="p-3 bg-secondary/10 rounded-2xl text-secondary">
            <span class="material-symbols-outlined text-3xl">hub</span>
        </div>
        <h3 class="font-headline font-bold text-2xl">مولد الكلمات الدلالية (LSI)</h3>
    </div>
    <div class="space-y-4">
        <input type="text" id="keyword-input" placeholder="أدخل الكلمة المفتاحية (مثلاً: صيانة سيارات)" 
               class="w-full p-4 rounded-2xl text-center font-bold">
        <button onclick="generateLSI()" class="w-full py-4 bg-secondary text-[#170529] rounded-2xl font-headline font-black hover:scale-105 transition-transform flex justify-center items-center gap-3">
            <span>توليد خريطة الكلمات</span>
            <div id="lsi-loader" class="loader border-t-primary"></div>
        </button>
        <div id="lsi-results" class="hidden grid grid-cols-2 gap-2 p-4 bg-white/5 rounded-2xl border border-secondary/20">
            </div>
    </div>
</section>
