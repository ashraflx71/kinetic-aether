<!DOCTYPE html>
<html class="dark" lang="ar" dir="rtl">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Kinetic Aether - Digital Lab</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Manrope:wght@400;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
    <style>
        :root { --bg: #170529; --primary: #ba9eff; --secondary: #53ddfc; --surface: #240e3b; }
        body { background-color: var(--bg); color: #f2dfff; font-family: 'Manrope', sans-serif; min-height: 100vh; font-size: 18px; }
        .font-headline { font-family: 'Space Grotesk', sans-serif; }
        .glass-card { background: rgba(36, 14, 59, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(186, 158, 255, 0.1); }
        .kinetic-gradient { background: linear-gradient(135deg, #ba9eff 0%, #8455ef 100%); }
        textarea, input { background: #1d0832 !important; border: 1px solid rgba(83, 221, 252, 0.2) !important; color: white !important; }
        .loader { width: 20px; height: 20px; border: 3px solid transparent; border-top-color: var(--secondary); border-radius: 50%; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-24 selection:bg-primary/30">

    <nav class="fixed top-0 w-full z-50 px-6 py-4 glass-card flex justify-between items-center">
        <div class="flex items-center gap-3">
            <a href="index.html" class="material-symbols-outlined text-primary">arrow_back</a>
            <h1 class="font-headline font-black text-xl tracking-tighter uppercase">المختبر الرقمي</h1>
        </div>
        <div class="flex gap-4">
            <span class="material-symbols-outlined text-secondary">science</span>
        </div>
    </nav>

    <main class="pt-28 px-6 max-w-6xl mx-auto space-y-12">
        
        <header class="text-right">
            <h2 class="text-4xl font-headline font-black text-primary mb-2">الخيمياء البرمجية</h2>
            <p class="opacity-60 text-lg">أدوات ذكية لتحليل وتحسين الأكواد بمعايير Kinetic Aether.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <section class="glass-card p-8 rounded-[2.5rem] space-y-6">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-primary/10 rounded-2xl text-primary"><span class="material-symbols-outlined text-3xl">search_check</span></div>
                    <h3 class="font-headline font-bold text-2xl">محلل SEO الذكي</h3>
                </div>
                <div class="space-y-4">
                    <input type="url" id="seo-url" placeholder="أدخل رابط الموقع (مثل creative2026.com)" class="w-full p-4 rounded-2xl text-center">
                    <button onclick="runSEO()" class="w-full py-4 kinetic-gradient rounded-2xl font-headline font-black text-[#170529] hover:scale-105 transition-transform flex justify-center items-center gap-3">
                        <span id="seo-btn-text">بدء التحليل</span>
                        <div id="seo-loader" class="loader"></div>
                    </button>
                    <div id="seo-result" class="hidden p-4 bg-white/5 rounded-2xl border border-white/10 text-sm leading-relaxed"></div>
                </div>
            </section>

            <section class="glass-card p-8 rounded-[2.5rem] space-y-6">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-secondary/10 rounded-2xl text-secondary"><span class="material-symbols-outlined text-3xl">cleaning_services</span></div>
                    <h3 class="font-headline font-bold text-2xl">مُنقي الكود الأخضر</h3>
                </div>
                <div class="space-y-4">
                    <textarea id="code-input" rows="4" placeholder="ألصق كود CSS أو JS هنا..." class="w-full p-4 rounded-2xl font-mono text-xs"></textarea>
                    <button onclick="purifyCode()" class="w-full py-4 border border-secondary text-secondary rounded-2xl font-headline font-bold hover:bg-secondary/10 transition-all">
                        تنظيف وضغط الكود
                    </button>
                    <textarea id="code-output" rows="4" readonly placeholder="الكود المنقى سيظهر هنا..." class="w-full p-4 rounded-2xl font-mono text-xs text-secondary/70"></textarea>
                </div>
            </section>

        </div>

    </main>

    <nav class="md:hidden fixed bottom-0 w-full p-5 bg-bg/80 backdrop-blur-2xl border-t border-white/5 flex justify-around items-center">
        <a href="index.html" class="material-symbols-outlined opacity-50">home</a>
        <a href="lab.html" class="material-symbols-outlined text-secondary scale-125">science</a>
        <a href="settings.html" class="material-symbols-outlined opacity-50">tune</a>
    </nav>

    <script>
        // --- منطق محلل الـ SEO ---
        function runSEO() {
            const url = document.getElementById('seo-url').value;
            if(!url) return alert("يا أشرف، الرابط مطلوب!");
            
            document.getElementById('seo-loader').style.display = 'block';
            document.getElementById('seo-btn-text').innerText = "جاري استدعاء الأثير...";
            
            setTimeout(() => {
                const score = Math.floor(Math.random() * 15) + 85;
                document.getElementById('seo-loader').style.display = 'none';
                document.getElementById('seo-btn-text').innerText = "تم التحليل ✅";
                const resultDiv = document.getElementById('seo-result');
                resultDiv.classList.remove('hidden');
                resultDiv.innerHTML = `
                    <p class="text-secondary font-bold mb-2">النتائج لـ ${url}:</p>
                    <ul class="space-y-1 opacity-80">
                        <li>• سرعة الأداء: <span class="text-green-400">${score}%</span></li>
                        <li>• الكود الأخضر: <span class="text-green-400">مثالي</span></li>
                        <li>• التوافق مع الجوال: <span class="text-green-400">100%</span></li>
                    </ul>
                `;
            }, 2000);
        }

        // --- منطق منقي الأكواد (Minifier) ---
        function purifyCode() {
            const input = document.getElementById('code-input').value;
            if(!input) return alert("ضع الكود أولاً!");
            
            // خوارزمية ضغط بسيطة (إزالة المسافات والأسطر) لزيادة السرعة
            const purified = input
                .replace(/\/\*[\s\S]*?\*\/|([^\\:]|^)\/\/.*$/gm, '') // إزالة التعليقات
                .replace(/\s+/g, ' ') // تحويل الأسطر لمسافات
                .replace(/\s*([\{\};:,])\s*/g, '$1') // إزالة المسافات حول الرموز
                .trim();
            
            document.getElementById('code-output').value = purified;
            alert("تم تنقية الكود بنجاح! حجم أقل = سرعة أكبر.");
        }
    </script>
</body>
</html>
