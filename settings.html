<div id="status-card" style="background: #000; border: 2px solid #D4AF37; padding: 25px; border-radius: 15px; color: #D4AF37; text-align: center; margin: 20px auto; max-width: 500px; box-shadow: 0 0 15px #D4AF37;">
    <h2 style="text-transform: uppercase; letter-spacing: 2px;">نظام Kinetic Aether</h2>
    <hr style="border: 0.5px solid #D4AF37; margin: 15px 0;">
    <p id="server-msg" style="font-size: 1.1rem;">في انتظار أوامر الـ Commander...</p>
    
    <button onclick="fetchData()" style="background: #D4AF37; color: #000; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; border-radius: 5px; transition: 0.3s; margin-top: 10px;">
        تحديث البيانات من SQLite 🛡️
    </button>
</div>

<script>
async function fetchData() {
    const msgElement = document.getElementById('server-msg');
    msgElement.innerText = "جاري الاتصال بالسيرفر المحلي... ⏳";
    
    try {
        // الاتصال بالسيرفر الذي يعمل في Pydroid الآن
        const response = await fetch('http://localhost:5000/api/data');
        const data = await response.json();
        
        if (data.status === "success") {
            msgElement.innerHTML = `<span style="color: #00FF00;">تم الاتصال بنجاح! ✅</span><br>البيانات: ${JSON.stringify(data.db_content)}`;
            console.log("Welcome Commander Ashraf:", data);
        }
    } catch (error) {
        msgElement.innerHTML = `<span style="color: #FF0000;">فشل الاتصال! ❌</span><br>تأكد أن Pydroid يعمل على http://localhost:5000`;
        console.error("Connection Error:", error);
    }
}
</script>
